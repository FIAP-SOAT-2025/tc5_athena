sonar.projectKey=tc5-sonar
sonar.projectName=tc5-hack

# Source paths
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts

# Coverage
sonar.coverage.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,iac/**,test-path/**
sonar.coverage.exclusions=**/*.spec.ts,src/main.ts,src/database/**,**/*.module.ts,**/*.dto.ts

# Language and timeouts
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.projectVersion=0.0.1
